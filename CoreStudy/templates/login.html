<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Core Study</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="toast-container" id="toast-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert-toast alert-{{ category }}" onclick="this.remove()">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="auth-wrapper-centered">
        <main class="auth-card-centered">
            <img src="{{ url_for('static', filename='img/logo_core_study.png') }}" alt="Logo Core Study" class="logo">
            
            <h1>Acesso ao Sistema</h1>
            <p>Insira as suas credenciais para continuar.</p>
            
            <form method="POST">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-icon-wrapper">
                        <i class="ph ph-envelope-simple"></i>
                        <input id="email" type="text" name="email" placeholder="nome@exemplo.com" required>
                    </div>
                </div>
                
                <div class="form-group" style="margin-bottom: 25px;">
                    <label for="senha">Senha</label>
                    <div class="input-icon-wrapper">
                        <i class="ph ph-lock-key"></i>
                        <input id="senha" type="password" name="senha" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="btn-block">
                    <button type="submit">Login</button>
                    <a href="/" class="btn-secondary">Voltar ao Início</a>
                </div>
            </form>
        </main>
    </div>

    <div class="unifecaf-corner">
        <span>Recomendamos</span>
        <a href="https://www.unifecaf.com.br" target="_blank" title="Visitar site da UniFECAF">
            <img src="{{ url_for('static', filename='img/unifecaf_logo.png') }}" alt="Logo UniFECAF">
        </a>
    </div>
    
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
