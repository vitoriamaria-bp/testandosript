{% extends "base.html" %}
{% block title %}Editar Material - Core Study{% endblock %}
{% block header_title %}Editar Material{% endblock %}

{% block content %}
<header class="page-header" style="display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px;">
    <div>
        <h1 style="font-size: 22px; color: var(--primary-color); font-weight: 700;">Editar Material</h1>
        <p style="color: var(--text-light); font-size: 13px;">Atualize as informações do material.</p>
    </div>
    <div>
        <a href="/admin/materiais" class="btn-secondary" style="font-size: 13px; padding: 6px 12px;">← Voltar</a>
    </div>
</header>

<div class="content-card" style="width: 100%; max-width: 650px; margin: 0 auto; padding: 30px;">
    <form action="/admin/editar-material/{{ material[0] }}" method="POST">
        
        <div class="form-group" style="margin-bottom: 15px;">
            <label for="nome" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Nome do Material</label>
            <input type="text" id="nome" name="nome" value="{{ material[1] }}" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="margin-bottom: 15px; flex: 1;">
                <label for="tipo" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Tipo do Arquivo</label>
                <input type="text" id="tipo" name="tipo" value="{{ material[2] }}" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
            </div>

            <div class="form-group" style="margin-bottom: 15px; flex: 1;">
                <label for="tamanho" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Tamanho do Arquivo</label>
                <input type="text" id="tamanho" name="tamanho" value="{{ material[3] }}" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="aula_id" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Aula Vinculada</label>
            <select id="aula_id" name="aula_id" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
                {% for aula in aulas %}
                    <option value="{{ aula[0] }}" {% if aula[0] == material[4] %}selected{% endif %}>{{ aula[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-top: 25px; display: flex; justify-content: center; gap: 10px;">
            <a href="/admin/materiais" class="btn-secondary" style="padding: 8px 16px !important; width: auto !important; flex: none;">Cancelar</a>
            <button type="submit" class="btn-primary" style="padding: 8px 16px !important; width: auto !important; flex: none;">Salvar Alterações</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        let menu = document.querySelector('.sidebar-menu a[href="/admin/materiais"]');
        if(menu) menu.classList.add('active');
    });
</script>
{% endblock %}
