{% extends "base.html" %}
{% block title %}Editar Aula - Core Study{% endblock %}
{% block header_title %}Editar Aula{% endblock %}

{% block content %}
<header class="page-header" style="display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px;">
    <div>
        <h1 style="font-size: 22px; color: var(--primary-color); font-weight: 700;">Editar Aula</h1>
        <p style="color: var(--text-light); font-size: 13px;">Atualize as informações e o link da aula.</p>
    </div>
    <div>
        <a href="/admin/aulas" class="btn-secondary" style="font-size: 13px; padding: 6px 12px;">← Voltar</a>
    </div>
</header>

<div class="content-card" style="width: 100%; max-width: 650px; margin: 0 auto; padding: 30px;">
    <form action="/admin/editar-aula/{{ aula[0] }}" method="POST">
        <div class="form-group" style="margin-bottom: 15px;">
            <label for="titulo" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Título da Aula</label>
            <input type="text" id="titulo" name="titulo" value="{{ aula[1] }}" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="url" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">URL do Vídeo</label>
            <input type="url" id="url" name="url" value="{{ aula[2] }}" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="modulo_id" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Módulo Vinculado</label>
            <select id="modulo_id" name="modulo_id" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
                {% for modulo in modulos %}
                    <option value="{{ modulo[0] }}" {% if modulo[0] == aula[3] %}selected{% endif %}>{{ modulo[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-top: 25px; display: flex; justify-content: center; gap: 10px;">
            <a href="/admin/aulas" class="btn-secondary" style="padding: 8px 16px !important; width: auto !important; flex: none;">Cancelar</a>
            <button type="submit" class="btn-primary" style="padding: 8px 16px !important; width: auto !important; flex: none;">Salvar Alterações</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        let menu = document.querySelector('.sidebar-menu a[href="/admin/aulas"]');
        if(menu) menu.classList.add('active');
    });
</script>
{% endblock %}
