<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Core Study</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="toast-container" id="toast-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert-toast alert-{{ category }}" onclick="this.remove()">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="auth-wrapper-centered">
        <main class="auth-card-slim">
            <img src="{{ url_for('static', filename='img/logo_core_study.png') }}" alt="Logo Core Study" class="logo">
            
            <h1>Criar Conta</h1>
            
            <form method="POST">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <div class="input-icon-wrapper">
                        <i class="ph ph-user"></i>
                        <input id="nome" type="text" name="nome" placeholder="Seu nome" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-icon-wrapper">
                        <i class="ph ph-envelope-simple"></i>
                        <input id="email" type="email" name="email" placeholder="nome@exemplo.com" required data-email-validation data-email-feedback="email-feedback">
                    </div>
                    <div id="email-feedback" class="field-feedback" aria-live="polite"></div>
                </div>

                <div class="form-group">
                    <label for="telefone_numero">Telefone</label>
                    <div class="phone-row" data-phone-field>
                        <div class="input-icon-wrapper">
                            <i class="ph ph-globe"></i>
                            <select data-phone-country aria-label="Código do país">
                                <option value="+55">+55</option>
                                <option value="+1">+1</option>
                                <option value="+351">+351</option>
                            </select>
                        </div>
                        <div class="input-icon-wrapper">
                            <i class="ph ph-phone"></i>
                            <input id="telefone_numero" type="text" name="telefone_numero" placeholder="(11) 99999-9999" required data-phone-number>
                        </div>
                        <input id="telefone" type="hidden" name="telefone" data-phone-full>
                    </div>
                </div>

                <div class="form-group">
                    <label for="data_nasc">Nascimento</label>
                    <div class="input-icon-wrapper">
                        <i class="ph ph-calendar"></i>
                        <input id="data_nasc" type="date" name="data_nasc" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-icon-wrapper">
                        <i class="ph ph-lock-key"></i>
                        <input id="senha" type="password" name="senha" placeholder="Mínimo 8 caracteres" minlength="8" required>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="termos_lgpd" name="termos_lgpd" required>
                    <label for="termos_lgpd">Aceito os Termos de Uso e Políticas de Privacidade (LGPD).</label>
                </div>

                <div class="btn-block-row">
                    <a href="/login" class="btn-secondary" style="flex: 1;">Voltar</a>
                    <button type="submit" class="btn-primary" style="flex: 1;">Criar Conta</button>
                </div>
            </form>
        </main>
    </div>

    <!-- O Selo Recomendado no Canto da Tela -->
    <div class="unifecaf-corner">
        <span>Recomendamos</span>
        <a href="https://www.unifecaf.com.br" target="_blank" title="Visitar site da UniFECAF">
            <img src="{{ url_for('static', filename='img/unifecaf_logo.png') }}" alt="Logo UniFECAF">
        </a>
    </div>

    <script src="{{ url_for('static', filename='email-validation.js') }}"></script>
    <script src="{{ url_for('static', filename='phone-format.js') }}"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
