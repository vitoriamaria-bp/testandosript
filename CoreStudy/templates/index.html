<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Study - Plataforma Educacional</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="auth-wrapper-centered home-simple-wrapper">
        <main class="auth-card-centered home-simple-card">
            <img src="{{ url_for('static', filename='img/logo_core_study.png') }}" alt="Logo Core Study" class="logo">

            <span class="home-simple-badge">Plataforma educacional</span>

            <h1>Core Study</h1>
            <p>
                Aprenda por trilhas com cursos, aulas em vídeo, materiais de apoio e acompanhamento de progresso.
            </p>

            <div class="home-simple-highlights" aria-label="Recursos da plataforma">
                <span>Cursos</span>
                <span>Módulos</span>
                <span>Progresso</span>
            </div>

            <div class="home-simple-actions">
                <a href="{{ url_for('login') }}" class="btn-primary">Entrar</a>
                <a href="{{ url_for('cadastro') }}" class="btn-secondary">Criar conta</a>
            </div>
        </main>
    </div>

    <div class="unifecaf-corner">
        <span>Recomendamos</span>
        <a href="https://www.unifecaf.com.br" target="_blank" title="Visitar site da UniFECAF">
            <img src="{{ url_for('static', filename='img/unifecaf_logo.png') }}" alt="Logo UniFECAF">
        </a>
    </div>
</body>

</html>
