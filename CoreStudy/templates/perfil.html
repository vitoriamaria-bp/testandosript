<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - Core Study</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #11213A;
            --accent-color: #FF6B00;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-image: linear-gradient(rgba(15, 23, 42, 0.94), rgba(15, 23, 42, 0.94)), url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2070&auto=format&fit=crop');
            background-color: #0f172a;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0; 
            padding: 0; 
            color: #f1f5f9; 
        }
        
        /* NAVBAR MAGRA */
        .student-navbar { 
            background-color: var(--primary-color); 
            padding: 0 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid var(--accent-color); 
            height: 50px; 
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .student-navbar img { 
            height: 30px; 
            object-fit: contain; 
        }

        .student-nav-right { display: flex; align-items: center; gap: 15px; }
        .student-greeting { font-weight: 700; color: #fff; font-size: 13px; display: flex; align-items: center; gap: 8px; } 
        
        .btn-logout { background-color: rgba(255,255,255,0.05); color: #fff; padding: 6px 14px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; font-family: 'Inter', sans-serif; }
        .btn-logout:hover { background-color: var(--accent-color); color: #fff; border-color: var(--accent-color); }

        /* CONTAINER COMPACTO */
        .student-container { max-width: 550px; margin: 15px auto; padding: 0 15px; } 

        .form-card { 
            background: #1E293B; 
            padding: 20px 25px; 
            border-radius: 12px; 
            border: 1px solid var(--accent-color); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        
        h1 { margin-top: 0; color: #fff; font-size: 18px; border-left: 4px solid var(--accent-color); padding-left: 10px; margin-bottom: 15px;}
        
        /* GRID DE CAMPOS REDUZIDOS */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 12px; }
        
        label { display: block; font-size: 10px; font-weight: 700; margin-bottom: 5px; color: #cbd5e1; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* FORÇA O FUNDO ESCURO NOS INPUTS */
        input { 
            width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; 
            background-color: #0f172a !important; color: #fff !important; 
            box-sizing: border-box; font-size: 13px; font-family: 'Inter', sans-serif; transition: 0.2s; 
        }
        input:focus { border-color: var(--accent-color); outline: none; }
        
        /* CORRIGE O FUNDO BRANCO DO PREENCHIMENTO AUTOMÁTICO (AUTOFILL) */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #0f172a inset !important;
            -webkit-text-fill-color: #fff !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* FORÇA O CALENDÁRIO A FICAR CLARO NO TEMA ESCURO */
        input[type="date"] {
            color-scheme: dark;
        }

        /* AVATAR SELECTOR */
        .avatar-selector { display: flex; gap: 8px; margin-bottom: 15px; background: #0f172a; padding: 10px; border-radius: 8px; justify-content: center; flex-wrap: wrap; border: 1px solid #334155; }
        .avatar-option { cursor: pointer; font-size: 18px; padding: 4px; background: #fff; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: 2px solid #334155; transition: 0.2s; box-sizing: border-box; }
        .avatar-option:hover { transform: scale(1.1); border-color: #cbd5e1; }
        
        /* CLASSE ACTIVE PARA DESTAQUE DO SELECIONADO */
        .avatar-option.active { border-color: var(--accent-color); border-width: 3px; box-shadow: 0 0 8px rgba(255, 107, 0, 0.6); transform: scale(1.1); }

        /* BOTÕES */
        .btn-save { width: 100%; padding: 10px; background: var(--accent-color); border: none; border-radius: 6px; color: #fff; font-weight: 700; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; transition: 0.2s; margin-top: 5px; }
        .btn-save:hover { background: #e65e00; }
        
        .btn-voltar { display: block; text-align: center; margin-top: 12px; padding: 8px; background: #11213A; color: #94a3b8; text-decoration: none; font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif; border: 1px solid #334155; border-radius: 6px; transition: 0.2s; cursor: pointer; }
        .btn-voltar:hover { background: #334155; color: #fff; border-color: #475569; }

        /* ESTILOS DO MODAL PERSONALIZADO */
        .modal-overlay {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200; align-items: center; justify-content: center;
        }
        
        .modal-card {
            background: #1E293B; width: 400px; padding: 30px; border-radius: 12px;
            border: 2px solid var(--accent-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); text-align: center;
        }
        
        .modal-card h2 { color: #fff; font-size: 18px; margin-top: 0; }
        .modal-card p { color: #cbd5e1; font-size: 13px; margin-bottom: 25px; }
        
        .modal-buttons { display: flex; gap: 15px; justify-content: center; }
        
        .btn-modal-confirm { padding: 10px 20px; background: var(--accent-color); color: #fff; border: none; border-radius: 6px; font-weight: 700; font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; }
        .btn-modal-cancel { padding: 10px 20px; background: #334155; color: #94a3b8; border: 1px solid #475569; border-radius: 6px; font-weight: 600; font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; }
        .btn-modal-cancel:hover { color: #fff; background: #475569; }
    </style>
</head>
<body>

    <header class="student-navbar">
        {% include 'mensagens.html' %}
        
        <div class="logo-box" style="background: #fff; padding: 4px 8px; border-radius: 6px; display: flex; align-items: center;">
            <img src="{{ url_for('static', filename='img/logo_core_study.png') }}" alt="Logo Core Study">
        </div>
        <div class="student-nav-right">
            <a href="/perfil" style="text-decoration:none; display:flex; align-items:center; gap:8px;">
                <div style="background: #ffffff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 2px solid var(--accent-color);">
                    <span id="nav-avatar-display" class="avatar-icon">{{ session.get('user_avatar', '🐧') }}</span>
                </div>
                <span class="student-greeting" style="color: #fff;">{{ nome_usuario }}</span>
            </a>
            <a href="/logout" class="btn-logout">Sair</a>
        </div>
    </header>

    <main class="student-container">
        
        <div class="form-card">
            <h1>Configurações da Conta</h1>
            
            <label>Alterar Avatar:</label>
            <div class="avatar-selector">
                <span class="avatar-option" onclick="setAvatar('🐧', this)">🐧</span>
                <span class="avatar-option" onclick="setAvatar('🦊', this)">🦊</span>
                <span class="avatar-option" onclick="setAvatar('🐼', this)">🐼</span>
                <span class="avatar-option" onclick="setAvatar('🐯', this)">🐯</span>
                <span class="avatar-option" onclick="setAvatar('🦉', this)">🦉</span>
                <span class="avatar-option" onclick="setAvatar('🐨', this)">🐨</span>
                <span class="avatar-option" onclick="setAvatar('🐸', this)">🐸</span>
                <span class="avatar-option" onclick="setAvatar('🐶', this)">🐶</span>
            </div>
            
            <form method="POST" id="perfilForm">
                <input type="hidden" name="avatar" id="input-avatar" value="{{ session.get('user_avatar', '🐧') }}">

                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" name="nome" placeholder="Seu nome completo" value="{{ usuario.nome_usuario }}" required>
                </div>
                
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" name="email" placeholder="seuemail@exemplo.com" value="{{ usuario.email_usuario }}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="text" name="telefone" placeholder="(00) 00000-0000" value="{{ usuario.telefone_usuario }}" required>
                    </div>
                    <div class="form-group">
                        <label>Data de Nascimento</label>
                        <input type="date" name="data_nasc" value="{{ usuario.dt_nasc_usuario }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" name="senha" placeholder="********" value="{{ usuario.senha_usuario }}" minlength="8" required>
                </div>
                
                <button type="button" class="btn-save" onclick="abrirModalConfirmacao()">Salvar Alterações</button>
            </form>
            
            <a href="#" onclick="acaoCancelar(event)" class="btn-voltar">Cancelar</a>
        </div>
    </main>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-card">
            <h2>Confirmar Atualização</h2>
            <p>Tem certeza que deseja salvar as alterações no seu perfil?</p>
            <div class="modal-buttons">
                <button class="btn-modal-confirm" onclick="confirmarEnvioFormulario()">Sim, atualizar</button>
                <button class="btn-modal-cancel" onclick="fecharModalConfirmacao()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        function setAvatar(icon, clickedElement) {
            document.getElementById('input-avatar').value = icon;
            document.getElementById('nav-avatar-display').textContent = icon;

            const options = document.querySelectorAll('.avatar-option');
            options.forEach(option => option.classList.remove('active'));
            clickedElement.classList.add('active');
        }

        const modal = document.getElementById('confirmModal');
        const form = document.getElementById('perfilForm');

        function abrirModalConfirmacao() {
            if (form.checkValidity()) {
                modal.style.display = 'flex';
            } else {
                form.reportValidity();
            }
        }

        function fecharModalConfirmacao() {
            modal.style.display = 'none';
        }

        function confirmarEnvioFormulario() {
            form.submit();
        }

        document.addEventListener("DOMContentLoaded", function() {
            const currentAvatar = document.getElementById('input-avatar').value;
            const options = document.querySelectorAll('.avatar-option');
            options.forEach(option => {
                if (option.textContent.trim() === currentAvatar) {
                    option.classList.add('active');
                }
            });

            if (document.referrer && !document.referrer.includes('/perfil')) {
                sessionStorage.setItem('urlAnterior', document.referrer);
            }
        });

        function acaoCancelar(event) {
            event.preventDefault();
            const urlSegura = sessionStorage.getItem('urlAnterior') || '/aluno';
            window.location.href = urlSegura;
            sessionStorage.removeItem('urlAnterior');
        }
    </script>
</body>
</html>
