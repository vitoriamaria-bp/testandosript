{% extends "base.html" %}
{% block title %}Editar Módulo - Core Study{% endblock %}
{% block header_title %}Editar Módulo{% endblock %}

{% block content %}
<header class="page-header" style="display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px;">
    <div>
        <h1 style="font-size: 22px; color: var(--primary-color); font-weight: 700;">Editar Módulo</h1>
        <p style="color: var(--text-light); font-size: 13px;">Atualize as informações do módulo.</p>
    </div>
    <div>
        <a href="/admin/modulos" class="btn-secondary" style="font-size: 13px; padding: 6px 12px;">← Voltar</a>
    </div>
</header>

<div class="content-card" style="max-width: 850px; margin: 0 auto; padding: 25px;">
    <form action="/admin/editar-modulo/{{ modulo[0] }}" method="POST">
        <div class="form-group" style="margin-bottom: 15px;">
            <label for="titulo" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Nome do Módulo</label>
            <input type="text" id="titulo" name="titulo" value="{{ modulo[1] }}" required style="width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px;">
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="curso_id" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Curso Vinculado</label>
            <select id="curso_id" name="curso_id" required style="width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px;">
                {% for curso in cursos %}
                    <option value="{{ curso[0] }}" {% if curso[0] == modulo[2] %}selected{% endif %}>{{ curso[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
            <a href="/admin/modulos" class="btn-secondary" style="padding: 8px 20px;">Cancelar</a>
            <button type="submit" class="btn-primary" style="padding: 8px 20px;">Salvar Alterações</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        let menu = document.querySelector('.sidebar-menu a[href="/admin/modulos"]');
        if(menu) menu.classList.add('active');
    });
</script>
{% endblock %}
