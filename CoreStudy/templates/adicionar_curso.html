{% extends "base.html" %}

{% block title %}Adicionar Curso - Core Study{% endblock %}

{% block header_title %}Adicionar Curso{% endblock %}

{% block content %}
<header class="page-header" style="display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px;">
    <div>
        <h1 style="font-size: 22px; color: var(--primary-color); font-weight: 700;">Novo Curso</h1>
        <p style="color: var(--text-light); font-size: 13px;">Preencha os campos para cadastrar o curso.</p>
    </div>
    <div>
        <a href="/admin/cursos" class="btn-secondary" style="font-size: 13px; padding: 6px 12px;">← Voltar</a>
    </div>
</header>

<div class="content-card" style="max-width: 850px; margin: 0 auto; padding: 25px;">
    
    <form action="/admin/adicionar-curso" method="POST">
        
        <div class="form-group" style="margin-bottom: 15px;">
            <label for="titulo" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Nome do Curso</label>
            <input type="text" id="titulo" name="titulo" placeholder="Ex: Python para Iniciantes" required style="width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px;">
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="descricao" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Descrição</label>
            <textarea id="descricao" name="descricao" rows="3" placeholder="Breve resumo..." required style="width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px;"></textarea>
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="margin-bottom: 15px; flex: 1;">
                <label for="carga_hora" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Carga Horária (horas)</label>
                <input type="number" id="carga_hora" name="carga_hora" placeholder="Ex: 40" required style="width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px;">
            </div>

            <div class="form-group" style="margin-bottom: 15px; flex: 1;">
                <label for="categoria_id" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; text-transform: none !important;">Categoria</label>
                <select id="categoria_id" name="categoria_id" required style="width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px;">
                    <option value="" disabled selected>Selecione...</option>
                    {% for categoria in categorias %}
                        <option value="{{ categoria[0] }}">{{ categoria[1] }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
            <a href="/admin/cursos" class="btn-secondary" style="padding: 8px 20px;">Cancelar</a>
            <button type="submit" class="btn-primary" style="padding: 8px 20px;">Salvar Curso</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        let menuCurso = document.querySelector('.sidebar-menu a[href="/admin/cursos"]');
        if(menuCurso) menuCurso.classList.add('active');
    });
</script>
{% endblock %}
