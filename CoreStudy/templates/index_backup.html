<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Study - EdTech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-wrapper-centered">
        <main class="auth-card-centered">
            <img src="{{ url_for('static', filename='img/logo_core_study.png') }}" alt="Logo Core Study" class="logo">
            
            <h1>Bem-vindo</h1>
            <p>Escolha uma opção abaixo para acessar a área de estudos e gestão da plataforma.</p>
            
            <div class="btn-block">
                <a href="{{ url_for('login') }}" class="btn-primary">Login</a>
                <a href="{{ url_for('cadastro') }}" class="btn-secondary">Criar Conta</a>
            </div>
        </main>
    </div>

    <div class="unifecaf-corner">
        <span>Recomendamos</span>
        <a href="https://www.unifecaf.com.br" target="_blank" title="Visitar site da UniFECAF">
            <img src="{{ url_for('static', filename='img/unifecaf_logo.png') }}" alt="Logo UniFECAF">
        </a>
    </div>
</body>
</html>
